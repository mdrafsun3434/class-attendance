<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Attendance System</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            outline: none;
        }

        select option {
            background: #16213e;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .admin-link {
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            text-decoration: underline;
        }

        #adminPanel {
            display: none;
            margin-top: 30px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            color: #00d2ff;
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <h2>Attendance System</h2>

        <select id="subject">
            <option value="Data Communication">Data Communication</option>
            <option value="Operating System">Operating System</option>
            <option value="Java">Java</option>
            <option value="Web">Web</option>
            <option value="Microprocessor">Microprocessor</option>
            <option value="Accounting">Accounting</option>
        </select>

        <input type="number" id="rollInput" placeholder="আপনার রোল নম্বর দিন">
        <button onclick="submitAttendance()">SUBMIT PRESENT</button>

        <p class="admin-link" onclick="loadAdminData()">Admin Login (For You Only)</p>

        <div id="adminPanel">
            <h3>Attendance Records</h3>
            <table id="recordTable">
                <thead>
                    <tr>
                        <th>Roll</th>
                        <th>Subject</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ১. এখানে আপনার আসল FIREBASE CONFIG বসান (ফায়ারবেস কনসোল থেকে কপি করে) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAKHZMyToMP2YfzssI_OqU1R6uALTTP-E",
            authDomain: "myattendancesystem-5cb1b.firebaseapp.com",
            projectId: "myattendancesystem-5cb1b",
            storageBucket: "myattendancesystem-5cb1b.firebasestorage.app",
            messagingSenderId: "694337369367",
            appId: "1:694337369367:web:ce963e574ecf8c488eb352",
            measurementId: "G-W7H8MB2EF5",
            databaseURL: "https://myattendancesystem-5cb1b-default-rtdb.firebaseio.com"

        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // প্রেজেন্ট জমা দেওয়ার ফাংশন
        function submitAttendance() {
            const roll = document.getElementById('rollInput').value;
            const sub = document.getElementById('subject').value;
            const time = new Date().toLocaleString('en-GB', { hour12: true });

            if (roll === "") {
                alert("দয়া করে রোল নম্বর দিন!");
                return;
            }

            database.ref('attendance/').push({
                roll: roll,
                subject: sub,
                timestamp: time
            }).then(() => {
                alert("প্রেজেন্ট সফলভাবে জমা হয়েছে!");
                document.getElementById('rollInput').value = "";
            }).catch((error) => {
                alert("Error: ডাটা সেভ হয়নি। Rules চেক করুন।");
                console.error(error);
            });
        }

        // অ্যাডমিন ডাটা দেখার ফাংশন
        function loadAdminData() {
            const password = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");

            if (password === "Rafsun") {
                document.getElementById('adminPanel').style.display = "block";

                // ডাটাবেস থেকে ডাটা রিড করা
                database.ref('attendance/').on('value', (snapshot) => {
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = "";

                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        let row = `<tr>
                        <td>${data.roll}</td>
                        <td>${data.subject}</td>
                        <td>${data.timestamp}</td>
                    </tr>`;
                        tableBody.innerHTML += row;
                    });
                });
                alert("লগইন সফল!");
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }
    </script>

</body>

</html>
