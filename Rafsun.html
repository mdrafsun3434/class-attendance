<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Attendance System</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 16px;
        }

        select option {
            background: #16213e;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .admin-link {
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            text-decoration: underline;
        }

        #adminPanel {
            display: none;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 450px;
        }

        th,
        td {
            padding: 12px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        th {
            background: rgba(255, 255, 255, 0.2);
            color: #00d2ff;
        }

        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-clear {
            background: #e63946 !important;
            margin-bottom: 15px;
            width: auto !important;
            padding: 10px 20px !important;
        }

        @media (max-width: 480px) {
            .glass-card { padding: 15px; }
            h2 { font-size: 1.2rem; }
            th, td { padding: 8px 4px; font-size: 12px; }
        }

        @media print {
            body { background: white !important; color: black !important; display: block !important; padding: 0; }
            .glass-card { box-shadow: none !important; border: none !important; max-width: 100% !important; width: 100% !important; background: transparent !important; backdrop-filter: none !important; }
            table { width: 100% !important; border: 1px solid #000 !important; color: black !important; }
            th, td { border: 1px solid #000 !important; padding: 10px !important; font-size: 16px !important; }
            th { background: #f2f2f2 !important; color: black !important; }
            button, .admin-link, .btn-delete, select, input { display: none !important; }
            @page { margin: 1cm; }
            body { zoom: 1.3; }
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <h2>Attendance System</h2>

        <select id="subject">
            <option value="Data Communication">Data Communication</option>
            <option value="Operating System">Operating System</option>
            <option value="Java">Java</option>
            <option value="Web">Web</option>
            <option value="Microprocessor">Microprocessor</option>
            <option value="Accounting">Accounting</option>
        </select>

        <input type="number" id="rollInput" placeholder="আপনার রোল নম্বর দিন">
        <button onclick="submitAttendance()">SUBMIT PRESENT</button>

        <p class="admin-link" onclick="loadAdminData()">Admin Login</p>

        <div id="adminPanel">
            <h3>Attendance Records</h3>

            <select id="filterSubject" onchange="updateTableUI()" style="border: 1px solid #00d2ff;">
                <option value="All">All Subjects (Can't Clear All)</option>
                <option value="Data Communication">Data Communication</option>
                <option value="Operating System">Operating System</option>
                <option value="Java">Java</option>
                <option value="Web">Web</option>
                <option value="Microprocessor">Microprocessor</option>
                <option value="Accounting">Accounting</option>
            </select>

            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button onclick="downloadPDF()" style="background: #28a745; width: auto; padding: 10px 20px;">Download PDF</button>
                <button class="btn-clear" onclick="clearSelectedSubjectData()">Clear This Subject</button>
            </div>

            <div class="table-container">
                <table id="recordTable">
                    <thead>
                        <tr>
                            <th>Roll</th>
                            <th>Subject</th>
                            <th>Time</th>
                            <th class="action-column">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKHZMyToMP2YfzssI_OqU1R6uALTTP-E",
            authDomain: "myattendancesystem-5cb1b.firebaseapp.com",
            projectId: "myattendancesystem-5cb1b",
            storageBucket: "myattendancesystem-5cb1b.firebasestorage.app",
            messagingSenderId: "694337369367",
            appId: "1:694337369367:web:ce963e574ecf8c488eb352",
            measurementId: "G-W7H8MB2EF5",
            databaseURL: "https://myattendancesystem-5cb1b-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allData = {};

        function submitAttendance() {
            const roll = document.getElementById('rollInput').value;
            const sub = document.getElementById('subject').value;
            const time = new Date().toLocaleString('en-GB', { hour12: true });

            if (roll === "") { alert("রোল নম্বর দিন!"); return; }

            database.ref('attendance/').push({
                roll: roll,
                subject: sub,
                timestamp: time
            }).then(() => {
                alert("সফলভাবে জমা হয়েছে!");
                document.getElementById('rollInput').value = "";
            });
        }

        function loadAdminData() {
            const password = prompt("পাসওয়ার্ড দিন:");
            if (password && password.trim() === "123") {
                document.getElementById('adminPanel').style.display = "block";
                database.ref('attendance/').on('value', (snapshot) => {
                    allData = snapshot.val() || {};
                    updateTableUI();
                });
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function updateTableUI() {
            const tableBody = document.getElementById('tableBody');
            const selectedFilter = document.getElementById('filterSubject').value;
            let rows = "";

            Object.keys(allData).reverse().forEach((key) => {
                const data = allData[key];
                if (selectedFilter === "All" || data.subject === selectedFilter) {
                    rows += `<tr>
                        <td>${data.roll}</td>
                        <td>${data.subject}</td>
                        <td>${data.timestamp}</td>
                        <td class="action-column"><button class="btn-delete" onclick="deleteRecord('${key}')">Delete</button></td>
                    </tr>`;
                }
            });
            tableBody.innerHTML = rows;
        }

        function deleteRecord(id) {
            if (confirm("আপনি কি নিশ্চিত?")) {
                database.ref('attendance/' + id).remove();
            }
        }

        // শুধুমাত্র সিলেক্ট করা সাবজেক্টের ডাটা ডিলিট করার ফাংশন
        function clearSelectedSubjectData() {
            const selectedFilter = document.getElementById('filterSubject').value;

            if (selectedFilter === "All") {
                alert("দয়া করে একটি নির্দিষ্ট সাবজেক্ট সিলেক্ট করুন। 'All Subjects' থাকা অবস্থায় সব ডাটা ডিলিট করা যাবে না।");
                return;
            }

            if (confirm(`আপনি কি নিশ্চিত যে '${selectedFilter}' সাবজেক্টের সব ডাটা ডিলিট করতে চান?`)) {
                // লুপ চালিয়ে শুধুমাত্র ওই সাবজেক্টের আইডিগুলো খুঁজে বের করে ডিলিট করা
                const keysToDelete = Object.keys(allData).filter(key => allData[key].subject === selectedFilter);
                
                if (keysToDelete.length === 0) {
                    alert("এই সাবজেক্টে কোনো ডাটা নেই।");
                    return;
                }

                let deletePromises = keysToDelete.map(key => database.ref('attendance/' + key).remove());

                Promise.all(deletePromises)
                    .then(() => {
                        alert(`'${selectedFilter}' এর সব ডাটা মুছে ফেলা হয়েছে!`);
                    })
                    .catch((error) => {
                        alert("সমস্যা হয়েছে: " + error.message);
                    });
            }
        }

        function downloadPDF() {
            const element = document.getElementById('recordTable');
            const selectedSubject = document.getElementById('filterSubject').value;
            element.style.color = "black";
            const actions = document.querySelectorAll('.action-column');
            actions.forEach(el => el.style.display = 'none');

            const opt = {
                margin: 10,
                filename: `Attendance_${selectedSubject}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: "#ffffff" },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.color = "white";
                actions.forEach(el => el.style.display = 'table-cell');
            });
        }
    </script>
</body>

</html>
